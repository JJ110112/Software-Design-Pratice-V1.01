<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="favicon.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>教師管理 | 學習進度儀表板</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0c1220;
            --surface: #1a2236;
            --surface2: #212d45;
            --border: #2e3f5c;
            --accent: #38bdf8;
            --purple: #a78bfa;
            --success: #10b981;
            --danger: #f43f5e;
            --text: #e2e8f0;
            --muted: #64748b;
        }
        body { margin: 0; padding: 20px; font-family: 'Noto Sans TC', sans-serif; background: var(--bg); color: var(--text); }
        .container { max-width: 1200px; margin: 0 auto; }
        header { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; margin-bottom: 20px; border-bottom: 1px solid var(--border); padding-bottom: 15px; }
        h1 { margin: 0; font-size: 1.5rem; color: var(--accent); white-space: nowrap; }

        .controls { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
        select, button { padding: 8px 12px; background: var(--surface2); border: 1px solid var(--border); color: var(--text); border-radius: 6px; }
        button { cursor: pointer; color: #fff; background: var(--purple); border: none; font-weight: bold; }
        button:hover { opacity: 0.9; }
        .btn-danger { background: var(--danger); margin-left: 10px; }
        
        .dashboard-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        .card { background: var(--surface); padding: 20px; border-radius: 12px; border: 1px solid var(--border); }
        .card h3 { margin-top: 0; color: var(--muted); font-size: 1rem; margin-bottom: 15px; }
        .stat-value { font-size: 2.5rem; font-weight: 700; color: #fff; }

        .charts-wrapper { display: grid; grid-template-columns: 2fr 1fr; gap: 20px; margin-bottom: 20px; }
        .chart-box { background: var(--surface); padding: 20px; border-radius: 12px; border: 1px solid var(--border); }
        canvas { width: 100% !important; max-height: 300px; }

        .table-wrapper { background: var(--surface); border-radius: 12px; border: 1px solid var(--border); overflow-x: auto; -webkit-overflow-scrolling: touch; }
        table { width: 100%; border-collapse: collapse; text-align: left; white-space: nowrap; }
        th, td { padding: 12px 20px; border-bottom: 1px solid var(--border); }
        th { background: rgba(0,0,0,0.2); color: var(--muted); font-weight: 500; font-size: 0.9rem; }
        tr:hover td { background: rgba(255,255,255,0.02); }
        .status-pass { color: var(--success); font-weight: bold; background: rgba(16,185,129,0.1); padding: 4px 8px; border-radius: 4px; }
        .status-fail { color: var(--danger); font-weight: bold; background: rgba(244,63,94,0.1); padding: 4px 8px; border-radius: 4px; }

        /* ── 學生練習狀況表 ── */
        .student-status-section { margin-bottom: 20px; }
        .student-status-section h2 { color: var(--accent); font-size: 1.2rem; margin: 0 0 12px; }
        .student-table-wrapper { background: var(--surface); border-radius: 12px; border: 1px solid var(--border); overflow-x: auto; -webkit-overflow-scrolling: touch; }
        .student-table { width: 100%; border-collapse: collapse; text-align: center; white-space: nowrap; }
        .student-table th, .student-table td { padding: 10px 14px; border-bottom: 1px solid var(--border); }
        .student-table th { background: rgba(0,0,0,0.2); color: var(--muted); font-weight: 500; font-size: 0.85rem; cursor: pointer; user-select: none; position: relative; }
        .student-table th:hover { color: var(--accent); }
        .student-table th .sort-arrow { margin-left: 4px; font-size: 0.7rem; }
        .student-table tr:hover td { background: rgba(255,255,255,0.02); }
        .student-table .no-practice { color: var(--danger); font-weight: 600; }
        .student-table .has-practice { color: var(--success); }
        .progress-bar { display: inline-block; width: 60px; height: 8px; background: var(--surface2); border-radius: 4px; overflow: hidden; vertical-align: middle; margin-left: 6px; }
        .progress-bar-fill { height: 100%; border-radius: 4px; background: linear-gradient(90deg, var(--accent), var(--purple)); }

        /* 手機 RWD */
        @media (max-width: 768px) {
            body { padding: 10px; }
            header { flex-direction: column; gap: 10px; align-items: flex-start; }
            .controls { flex-wrap: wrap; }
            .dashboard-grid { grid-template-columns: 1fr; }
            .charts-wrapper { grid-template-columns: 1fr; }
            .student-table th, .student-table td { padding: 8px 10px; font-size: 0.8rem; }
        }
    </style>
    <!-- Chart.js 引入 -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<div class="container">
    <header>
        <h1>👨‍🏫 教師管理 | 學生學習進度儀表板</h1>
        <div class="controls">
            <select id="filter-class">
                <option value="ALL">全站即時所有班級</option>
            </select>
            <button id="btn-refresh">↻ 刷新資料</button>
            <button id="btn-export" style="background:var(--success);">📥 匯出紀錄</button>
            <a href="manage-roster.html" class="btn" style="background:var(--purple);color:#000;text-decoration:none;font-size:.85rem;">👥 學生管理</a>
            <a href="index.html" style="margin-left:10px; color: var(--muted); text-decoration: none;">返回首頁</a>
        </div>
    </header>

    <div class="dashboard-grid">
        <div class="card">
            <h3>總過關紀錄數</h3>
            <div class="stat-value" id="stat-total">0</div>
        </div>
        <div class="card">
            <h3>參與學生人數</h3>
            <div class="stat-value" id="stat-students">0</div>
        </div>
        <div class="card">
            <h3>平均耗時最久的題目</h3>
            <div class="stat-value" id="stat-hardest" style="font-size: 1.5rem; color: var(--danger); margin-top:10px;">計算中...</div>
        </div>
    </div>

    <div class="charts-wrapper">
        <div class="chart-box">
            <h3 style="color:var(--muted); margin-top:0;">班級總體過關挑戰率 (由最近 500 筆紀錄統計)</h3>
            <canvas id="barChart"></canvas>
        </div>
        <div class="chart-box">
            <h3 style="color:var(--muted); margin-top:0;">各階段通關人數</h3>
            <canvas id="stageChart"></canvas>
        </div>
    </div>

    <!-- 學生練習狀況 -->
    <div class="student-status-section">
        <h2>📋 學生練習狀況一覽（含未練習學生）</h2>
        <div class="student-table-wrapper">
            <table class="student-table" id="student-status-table">
                <thead>
                    <tr>
                        <th data-col="no">座號 <span class="sort-arrow"></span></th>
                        <th data-col="name">姓名 <span class="sort-arrow"></span></th>
                        <th data-col="className">班級 <span class="sort-arrow"></span></th>
                        <th data-col="stars">⭐ 星星 <span class="sort-arrow"></span></th>
                        <th data-col="clears">破關數 <span class="sort-arrow"></span></th>
                        <th data-col="attempts">挑戰次數 <span class="sort-arrow"></span></th>
                        <th data-col="lastActive">最後練習 <span class="sort-arrow"></span></th>
                        <th data-col="progress">進度 <span class="sort-arrow"></span></th>
                    </tr>
                </thead>
                <tbody id="tb-student-status">
                    <tr><td colspan="8" style="text-align:center;color:var(--muted);">載入中...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- 紀錄明細（分頁） -->
    <div class="table-wrapper">
        <table>
            <thead>
                <tr>
                    <th>時間</th>
                    <th>班級</th>
                    <th>姓名</th>
                    <th>題號 (qID)</th>
                    <th>模式</th>
                    <th>花費秒數</th>
                    <th>狀態</th>
                </tr>
            </thead>
            <tbody id="tb-recent">
                <tr><td colspan="7" style="text-align:center;">載入中...</td></tr>
            </tbody>
        </table>
        <div id="pagination" style="display:flex;justify-content:center;align-items:center;gap:10px;padding:16px;color:var(--muted);font-size:.9rem;">
        </div>
    </div>

    <!-- 教師管理工具（摺疊） -->
    <details style="margin-top:20px;">
        <summary style="cursor:pointer;color:var(--muted);font-size:.9rem;padding:12px 0;user-select:none;">🔧 教師管理工具（需要密碼）</summary>
        <div class="card" style="margin-top:8px;border:1px solid var(--danger);">
            <div style="display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end;">
                <div>
                    <label style="display:block;font-size:.8rem;color:var(--muted);margin-bottom:4px;">刪除單一學生成績</label>
                    <div style="display:flex;gap:6px;">
                        <input id="del-student-name" type="text" placeholder="輸入學生姓名" style="width:140px;">
                        <button id="btn-del-single" style="background:var(--danger);">刪除該生</button>
                    </div>
                </div>
                <button id="btn-del-all" style="background:var(--danger);">⚠️ 刪除全部成績</button>
                <button id="btn-seed-teacher" style="background:var(--success);">🔄 回復測試教師資料</button>
                <button id="btn-rebuild-ranking" style="background:#fbbf24;color:#000;">🏆 手動結算排行榜</button>
                <button id="btn-clear-cache" style="background:var(--surface2);">🗑️ 清除本地快取</button>
            </div>
        </div>
    </details>
</div>

<script src="js/users.js"></script>
<script type="module" src="js/api.js?v=10"></script>
<script>
let rawData = [];
let fullRankingData = [];
let chart1, chart2;
let currentPage = 1;
const PAGE_SIZE = 20;

document.addEventListener('DOMContentLoaded', () => {
    // 當按下刷新按鈕：同時結算排行榜 + 刷新資料
    document.getElementById('btn-refresh').addEventListener('click', async () => {
        const btn = document.getElementById('btn-refresh');
        btn.textContent = '結算+刷新中...'; btn.disabled = true;
        try {
            // 先結算排行榜（背景，不阻擋 UI）
            const { getFunctions, httpsCallable } = await import("https://www.gstatic.com/firebasejs/10.9.0/firebase-functions.js");
            const fn = getFunctions(undefined, "asia-east1");
            const callable = httpsCallable(fn, "rebuildLeaderboard");
            await callable({});
            console.log("✅ 排行榜已結算");
        } catch(e) {
            console.warn("排行榜結算跳過:", e.message);
        }
        // 清除快取並刷新資料
        localStorage.removeItem('fb_cache_dashboard_teacher');
        localStorage.removeItem('fb_cache_overall_ranking_v2');
        _forceRefresh = true;
        btn.textContent = '↻ 刷新資料'; btn.disabled = false;
        fetchData();
    });
    
    // 當切換下拉選單，不用重新 fetch，只需 refresh UI
    document.getElementById('filter-class').addEventListener('change', renderDashboard);

    // ── 教師管理工具 ──
    document.getElementById('btn-del-single').addEventListener('click', async () => {
        const name = document.getElementById('del-student-name').value.trim();
        if (!name) { alert('請輸入學生姓名'); return; }
        const pwd = prompt(`確定要刪除「${name}」的所有成績？\n請輸入教師密碼：`);
        if (!pwd) return;
        try {
            const r = await window.deleteScores(pwd, 'single', name);
            localStorage.removeItem(`fb_cache_${name}`);
            localStorage.setItem('fb_data_updated', Date.now().toString());
            alert(`✅ 已刪除 ${r.deleted} 筆成績`);
            document.getElementById('del-student-name').value = '';
            fetchData();
        } catch(e) { alert('❌ ' + (e.message || '操作失敗')); }
    });

    document.getElementById('btn-del-all').addEventListener('click', async () => {
        if (!confirm('⚠️ 確定要刪除全部學生成績？此操作無法復原！')) return;
        const pwd = prompt('請輸入教師密碼：');
        if (!pwd) return;
        try {
            const r = await window.deleteScores(pwd, 'all');
            // 清除所有快取
            Object.keys(localStorage).filter(k => k.startsWith('fb_cache_') || k.startsWith('last_sync_')).forEach(k => localStorage.removeItem(k));
            localStorage.setItem('fb_data_updated', Date.now().toString());
            alert(`✅ 已刪除全部 ${r.deleted} 筆成績`);
            fetchData();
        } catch(e) { alert('❌ ' + (e.message || '操作失敗')); }
    });

    document.getElementById('btn-seed-teacher').addEventListener('click', async () => {
        const pwd = prompt('一鍵回復測試教師（測試老師 + 蔡明耀）全 3 星 + 自動結算排行榜\n\n請輸入教師密碼：');
        if (!pwd) return;
        const btn = document.getElementById('btn-seed-teacher');
        btn.textContent = '回復中...'; btn.disabled = true;
        try {
            const r1 = await window.seedTestTeacher(pwd, '測試老師');
            const r2 = await window.seedTestTeacher(pwd, '蔡明耀');
            // 清除所有快取（含 IndexedDB 信號），通知其他分頁
            Object.keys(localStorage).filter(k => k.startsWith('fb_cache_') || k.startsWith('last_sync_')).forEach(k => localStorage.removeItem(k));
            // 寫入時戳信號，讓其他分頁偵測到資料已更新需要 forceRefresh
            localStorage.setItem('fb_data_updated', Date.now().toString());
            alert(`✅ 完成！\n測試老師: ${r1.records} 筆\n蔡明耀: ${r2.records} 筆\n排行榜已自動結算`);
            fetchData();
        } catch(e) { alert('❌ ' + (e.message || '操作失敗')); }
        finally { btn.textContent = '🔄 回復測試教師資料'; btn.disabled = false; }
    });

    document.getElementById('btn-rebuild-ranking').addEventListener('click', async () => {
        const pwd = prompt('請輸入教師密碼：');
        if (!pwd) return;
        const btn = document.getElementById('btn-rebuild-ranking');
        btn.textContent = '結算中...'; btn.disabled = true;
        try {
            if (typeof window.rebuildLeaderboardSummary !== 'function') {
                // 透過 Cloud Function 結算
                const { getFunctions, httpsCallable } = await import("https://www.gstatic.com/firebasejs/10.9.0/firebase-functions.js");
                const fn = getFunctions(undefined, "asia-east1");
                const callable = httpsCallable(fn, "rebuildLeaderboard");
                const r = await callable({ teacherPassword: pwd });
                localStorage.removeItem('fb_cache_overall_ranking_v2');
                alert(`✅ 排行榜結算完成！${r.data.studentCount} 位學生、${r.data.totalRecords} 筆紀錄`);
                fetchData();
            }
        } catch(e) { alert('❌ ' + (e.message || '結算失敗')); }
        finally { btn.textContent = '🏆 結算排行榜'; btn.disabled = false; }
    });

    document.getElementById('btn-clear-cache').addEventListener('click', () => {
        const keys = Object.keys(localStorage).filter(k => k.startsWith('fb_cache_') || k.startsWith('last_sync_'));
        keys.forEach(k => localStorage.removeItem(k));
        alert(`✅ 已清除 ${keys.length} 筆本地快取，重新載入頁面`);
        location.reload();
    });

    // ── 匯出紀錄 ──
    document.getElementById('btn-export').addEventListener('click', () => {
        const filterCls = document.getElementById('filter-class').value;
        const filterLabel = filterCls === 'ALL' ? '全班級' : filterCls;

        if (studentRows.length === 0) {
            alert('目前無學生資料可匯出');
            return;
        }

        // 學生練習狀況總表
        const summaryHeader = ['座號', '姓名', '班級', '星星數', '破關數', '挑戰次數', '最後練習時間', '進度(%)'];
        const summaryRows = studentRows.map(r => {
            const lastStr = r.lastActive ? new Date(r.lastActive).toLocaleString('zh-TW') : '';
            return [r.no, r.name, r.className, r.stars, r.clears, r.attempts, lastStr, r.progress];
        });

        // 詳細紀錄明細
        const filteredData = filterCls === 'ALL' ? rawData : rawData.filter(d => d.className === filterCls);
        const detailHeader = ['時間', '班級', '姓名', '題號(qID)', '模式', '花費秒數', '狀態', '星星數'];
        const detailRows = filteredData.map(r => {
            const dt = new Date(r.timestamp).toLocaleString('zh-TW');
            return [dt, r.className || '', r.userName || '訪客', r.qID, r.gameMode, r.timeSpent, r.status, r.stars !== undefined ? r.stars : ''];
        });

        // 組合 CSV（BOM + 兩張表）
        const csvEscape = v => {
            const s = String(v == null ? '' : v);
            return s.includes(',') || s.includes('"') || s.includes('\n') ? '"' + s.replace(/"/g, '""') + '"' : s;
        };
        const toCSV = (header, rows) => [header.map(csvEscape).join(','), ...rows.map(r => r.map(csvEscape).join(','))].join('\n');

        const csv = '\uFEFF'
            + '=== 學生練習狀況總表 ===\n'
            + toCSV(summaryHeader, summaryRows)
            + '\n\n=== 詳細紀錄明細 (' + filteredData.length + ' 筆) ===\n'
            + toCSV(detailHeader, detailRows);

        // 下載
        const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        const dateStr = new Date().toISOString().slice(0, 10);
        a.href = url;
        a.download = `學生練習紀錄_${filterLabel}_${dateStr}.csv`;
        a.click();
        URL.revokeObjectURL(url);
    });

    // 延遲 1 秒等模組內的 Firebase 載入完畢，安全呼叫
    setTimeout(async () => {
        // 信任 DASH_TTL (5分鐘) 快取，不強制清除，避免每次 F5 都打 Firestore

        // 動態載入班級下拉選項
        if (typeof window.loadClassRoster === 'function') {
            try { await window.loadClassRoster(); } catch(e) {}
        }
        const sel = document.getElementById('filter-class');
        if (typeof CLASS_ROSTER !== 'undefined') {
            Object.keys(CLASS_ROSTER).forEach(cls => {
                sel.innerHTML += `<option value="${cls}">${cls}</option>`;
            });
        }
        fetchData();
    }, 800);
});

let _forceRefresh = false;

async function fetchData() {
    const btn = document.getElementById('btn-refresh');
    btn.textContent = "載入中...";
    btn.disabled = true;

    try {
        if (typeof window.getAllScoresForDashboard !== 'function') {
            console.warn("API 模組尚在初始化...");
            setTimeout(fetchData, 1000);
            return;
        }

        const force = _forceRefresh;
        _forceRefresh = false;

        // 同時撈取「近期紀錄」與「全站排行（精確星星數）」
        [rawData, fullRankingData] = await Promise.all([
            window.getAllScoresForDashboard(force),
            typeof window.getOverallRanking === 'function' ? window.getOverallRanking("ALL", force) : []
        ]);
        console.log("儀表板資料筆數:", rawData.length, "排行榜人數:", fullRankingData.length, force ? "(即時查詢)" : "(快取)");
        renderDashboard();
    } catch(e) {
        console.error("儀表板載入失敗:", e);
        alert("資料載入失敗：" + (e.message || e));
    } finally {
        btn.textContent = "↻ 刷新資料";
        btn.disabled = false;
    }
}

function renderDashboard() {
    const filterCls = document.getElementById('filter-class').value;
    const data = filterCls === 'ALL' ? rawData : rawData.filter(d => d.className === filterCls);

    // ========== Stats Update ==========
    document.getElementById('stat-total').textContent = data.length;
    
    const uniqueStudents = new Set(data.map(d => `${d.className}_${d.userName}`));
    document.getElementById('stat-students').textContent = uniqueStudents.size;

    // 找出平均耗時最久的題目（至少 3 人挑戰過才統計）
    const qTime = {};
    data.forEach(d => {
        if (d.status !== 'PASS' || !d.timeSpent) return;
        if (!qTime[d.qID]) qTime[d.qID] = { total: 0, count: 0 };
        qTime[d.qID].total += Number(d.timeSpent);
        qTime[d.qID].count++;
    });
    let slowestQ = "無資料", longestAvg = 0;
    for (const [q, s] of Object.entries(qTime)) {
        if (s.count >= 3) {
            const avg = s.total / s.count;
            if (avg > longestAvg) { longestAvg = avg; slowestQ = q; }
        }
    }
    document.getElementById('stat-hardest').textContent = longestAvg > 0 ? `${slowestQ} (平均 ${Math.round(longestAvg)}秒)` : "資料不足";

    // ========== 學生練習狀況 ==========
    buildStudentStatus(data);

    // ========== Table Render (分頁) ==========
    renderTable(data);
}

function renderTable(data) {
    const tbody = document.getElementById('tb-recent');
    const pagination = document.getElementById('pagination');
    tbody.innerHTML = '';

    if (data.length === 0) {
        tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;">目前尚無挑戰紀錄喔！</td></tr>';
        pagination.innerHTML = '';
        return;
    }

    const totalPages = Math.ceil(data.length / PAGE_SIZE);
    if (currentPage > totalPages) currentPage = totalPages;
    const start = (currentPage - 1) * PAGE_SIZE;
    const pageData = data.slice(start, start + PAGE_SIZE);

    pageData.forEach(r => {
        const dt = new Date(r.timestamp);
        const timeStr = `${dt.getMonth()+1}/${dt.getDate()} ${dt.getHours()}:${dt.getMinutes().toString().padStart(2, '0')}`;
        const statusTag = r.status === 'PASS' ? '<span class="status-pass">過關</span>' : '<span class="status-fail">失敗</span>';
        tbody.innerHTML += `
            <tr>
                <td>${timeStr}</td>
                <td>${escapeHTML(r.className) || '-'}</td>
                <td>${escapeHTML(r.userName) || '訪客'}</td>
                <td>${escapeHTML(r.qID)}</td>
                <td>${escapeHTML(r.gameMode)}</td>
                <td>${r.timeSpent} 秒</td>
                <td>${statusTag}</td>
            </tr>
        `;
    });

    // 分頁控制
    const btnStyle = 'padding:6px 14px;border-radius:6px;border:1px solid var(--border);background:var(--surface2);color:var(--text);cursor:pointer;font-family:inherit;';
    const activeStyle = 'padding:6px 14px;border-radius:6px;border:1px solid var(--accent);background:var(--accent);color:#000;font-weight:700;cursor:default;font-family:inherit;';

    let html = '';
    if (currentPage > 1) html += `<button style="${btnStyle}" onclick="goPage(${currentPage-1})">← 上一頁</button>`;

    const maxShow = 5;
    let startP = Math.max(1, currentPage - Math.floor(maxShow/2));
    let endP = Math.min(totalPages, startP + maxShow - 1);
    if (endP - startP < maxShow - 1) startP = Math.max(1, endP - maxShow + 1);

    for (let p = startP; p <= endP; p++) {
        html += `<button style="${p === currentPage ? activeStyle : btnStyle}" onclick="goPage(${p})">${p}</button>`;
    }

    if (currentPage < totalPages) html += `<button style="${btnStyle}" onclick="goPage(${currentPage+1})">下一頁 →</button>`;
    html += `<span style="margin-left:10px;font-size:.8rem;">共 ${data.length} 筆 / ${totalPages} 頁</span>`;
    pagination.innerHTML = html;

    // ========== Charts Render ==========
    renderCharts(data);
}

function goPage(p) {
    currentPage = p;
    const filterCls = document.getElementById('filter-class').value;
    const data = filterCls === 'ALL' ? rawData : rawData.filter(d => d.className === filterCls);
    renderTable(data);
    document.querySelector('.table-wrapper').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function renderCharts(data) {
    if (chart1) chart1.destroy();
    if (chart2) chart2.destroy();

    // 1. Bar Chart: 不同題目的過關總量
    const passCountByQ = {};
    data.filter(d => d.status === 'PASS' && !d.qID.startsWith('E2E_') && d.qID !== 'TEST_E2E').forEach(d => {
        passCountByQ[d.qID] = (passCountByQ[d.qID] || 0) + 1;
    });
    
    const labels1 = Object.keys(passCountByQ);
    const data1 = Object.values(passCountByQ);

    const ctx1 = document.getElementById('barChart').getContext('2d');
    chart1 = new Chart(ctx1, {
        type: 'bar',
        data: {
            labels: labels1,
            datasets: [{
                label: '已完成 (人次)',
                data: data1,
                backgroundColor: 'rgba(56, 189, 248, 0.7)',
                borderColor: '#38bdf8',
                borderWidth: 1,
                borderRadius: 4
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            scales: { y: { beginAtZero: true, ticks: { color: '#64748b', stepSize: 1 } }, x: { ticks: { color: '#64748b' } } },
            plugins: { legend: { display: false } }
        }
    });

    // 2. 各階段通關人數（含模擬考獨立顯示）
    const STAGE_MODES = {
        '階段一 認識': ['連連看', '記憶翻牌遊戲', '中英選擇題'],
        '階段二 理解': ['一行程式碼翻譯', '錯誤找找看', '程式碼朗讀練習'],
        '階段三 應用': ['程式碼排列重組', '程式與結果配對', '逐行中文注解填空'],
        '階段四 打字': ['打字-關鍵字', '打字-單行', '看中文寫程式', '打字-完整', '打字練習'],
        '階段五 實作': ['程式填空', '獨立全程式撰寫', '錯誤程式除錯'],
        '模擬考': ['模擬考']
    };
    const stageStudents = {};
    for (const stage in STAGE_MODES) stageStudents[stage] = new Set();

    data.filter(d => d.status === 'PASS').forEach(d => {
        const studentKey = d.className + '_' + d.userName;
        for (const [stage, modes] of Object.entries(STAGE_MODES)) {
            if (modes.includes(d.gameMode)) {
                stageStudents[stage].add(studentKey);
            }
        }
    });

    const stageLabels = Object.keys(STAGE_MODES).reverse();
    const stageCounts = stageLabels.map(s => stageStudents[s].size);
    const stageColors = ['#f43f5e', '#f97316', '#fbbf24', '#4ade80', '#a78bfa', '#38bdf8'];

    const ctx2 = document.getElementById('stageChart').getContext('2d');
    chart2 = new Chart(ctx2, {
        type: 'bar',
        data: {
            labels: stageLabels,
            datasets: [{
                label: '通關人數',
                data: stageCounts,
                backgroundColor: stageColors.map(c => c + 'cc'),
                borderColor: stageColors,
                borderWidth: 1,
                borderRadius: 6
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            indexAxis: 'y',
            scales: {
                x: { beginAtZero: true, ticks: { color: '#64748b', stepSize: 1 } },
                y: { ticks: { color: '#e2e8f0', font: { size: 12 } } }
            },
            plugins: {
                legend: { display: false },
                tooltip: {
                    callbacks: {
                        label: ctx => ctx.raw + ' 人'
                    }
                }
            }
        }
    });
}

// ═══════════════════════════════════════════
//  學生練習狀況表（含排序）
// ═══════════════════════════════════════════
const MAX_STARS = 912;
let studentRows = [];
let sortCol = 'stars';
let sortAsc = false;

function buildStudentStatus(data) {
    const filterCls = document.getElementById('filter-class').value;

    // 從近期 500 筆紀錄，彙整每位學生的近期活躍資料 + 即時星星計算
    const practiceMap = {};
    data.forEach(r => {
        const key = `${r.className}_${r.userName}`;
        if (!practiceMap[key]) {
            practiceMap[key] = { attempts: 0, lastTime: 0, bestLevelInfo: {} };
        }
        const p = practiceMap[key];
        p.attempts++;
        const ts = new Date(r.timestamp).getTime();
        if (ts > p.lastTime) p.lastTime = ts;

        // 即時計算星星（僅 PASS 紀錄）
        if (r.status === 'PASS') {
            const levelKey = `${r.qID}_${r.gameMode}`;
            const stars = r.stars !== undefined ? r.stars : 1;
            if (!p.bestLevelInfo[levelKey] || stars > p.bestLevelInfo[levelKey]) {
                p.bestLevelInfo[levelKey] = stars;
            }
        }
    });

    // 從全站排行榜取得結算的星星/破關數
    const rankMap = {};
    if (fullRankingData) {
        fullRankingData.forEach(r => rankMap[`${r.className}_${r.userName}`] = r);
    }

    // 建立所有學生列表（含未練習）
    studentRows = [];
    const classes = filterCls === 'ALL' ? Object.keys(CLASS_ROSTER) : [filterCls];
    classes.forEach(cls => {
        if (!CLASS_ROSTER[cls]) return;
        CLASS_ROSTER[cls].forEach(s => {
            const key = `${cls}_${s.name}`;
            const p = practiceMap[key];
            const rank = rankMap[key];

            // 從近期紀錄即時算出的星星與破關數
            let liveStars = 0, liveClears = 0;
            if (p) {
                for (const k in p.bestLevelInfo) {
                    liveStars += p.bestLevelInfo[k];
                    liveClears++;
                }
            }

            // 取排行榜結算值與即時值的較大者
            const rankStars = rank ? rank.stars : 0;
            const rankClears = rank ? rank.uniqueClears : 0;
            const totalStars = Math.max(rankStars, liveStars);
            const clears = Math.max(rankClears, liveClears);

            // 挑戰次數與最後活躍：近期紀錄優先，排行榜資料補底
            const recentAttempts = p ? p.attempts : 0;
            const rankAttempts = rank && rank.totalAttempts ? rank.totalAttempts : 0;
            const attempts = Math.max(recentAttempts, rankAttempts);

            const recentLastActive = p ? p.lastTime : 0;
            const rankLastActive = rank && rank.lastActive ? new Date(rank.lastActive).getTime() : 0;
            const lastActive = Math.max(recentLastActive, rankLastActive);

            studentRows.push({
                no: s.no,
                name: s.name,
                className: cls,
                stars: totalStars,
                clears: clears,
                attempts: attempts,
                lastActive: lastActive,
                progress: Math.round(totalStars / MAX_STARS * 100)
            });
        });
    });

    sortAndRenderStudents();
}

function sortAndRenderStudents() {
    studentRows.sort((a, b) => {
        let va = a[sortCol], vb = b[sortCol];
        if (typeof va === 'string') { va = va.localeCompare ? va : ''; vb = vb.localeCompare ? vb : ''; return sortAsc ? va.localeCompare(vb) : vb.localeCompare(va); }
        return sortAsc ? va - vb : vb - va;
    });

    const tbody = document.getElementById('tb-student-status');
    if (studentRows.length === 0) {
        tbody.innerHTML = '<tr><td colspan="8" style="text-align:center;color:var(--muted);">無學生資料</td></tr>';
        return;
    }

    tbody.innerHTML = studentRows.map(r => {
        const lastStr = r.lastActive ? (() => { const d = new Date(r.lastActive); return `${d.getMonth()+1}/${d.getDate()} ${d.getHours()}:${d.getMinutes().toString().padStart(2,'0')}`; })() : '-';
        const hasPractice = r.attempts > 0 || r.stars > 0;
        const practiceCls = hasPractice ? 'has-practice' : 'no-practice';
        const barW = Math.min(r.progress, 100);
        
        let attemptHtml = r.attempts;
        if (r.attempts === 0) {
            attemptHtml = r.stars > 0 ? '<span style="color:var(--muted);" title="紀錄較早，不在近期 500 筆挑戰內">-</span>' : '<span style="color:var(--danger);">未練習</span>';
        }

        return `<tr>
            <td>${r.no}</td>
            <td style="text-align:left;font-weight:600;">${escapeHTML(r.name)}</td>
            <td>${escapeHTML(r.className)}</td>
            <td class="${practiceCls}">${r.stars}</td>
            <td class="${practiceCls}">${r.clears}</td>
            <td class="${practiceCls}">${attemptHtml}</td>
            <td>${lastStr}</td>
            <td>${r.progress}%<div class="progress-bar"><div class="progress-bar-fill" style="width:${barW}%"></div></div></td>
        </tr>`;
    }).join('');

    // 更新排序箭頭
    document.querySelectorAll('#student-status-table th').forEach(th => {
        const arrow = th.querySelector('.sort-arrow');
        if (!arrow) return;
        arrow.textContent = th.dataset.col === sortCol ? (sortAsc ? '▲' : '▼') : '';
    });
}

// 欄位點擊排序
document.getElementById('student-status-table').addEventListener('click', e => {
    const th = e.target.closest('th[data-col]');
    if (!th) return;
    const col = th.dataset.col;
    if (sortCol === col) { sortAsc = !sortAsc; } else { sortCol = col; sortAsc = col === 'no' || col === 'name' || col === 'className'; }
    sortAndRenderStudents();
});
</script>
