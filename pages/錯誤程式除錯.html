<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/png" href="../favicon.png">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>術科練習 ── 錯誤程式除錯</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/common.css?v=5">
<style>
.game-section { padding: 0 12px 40px; max-width: 900px; margin: 0 auto; }
.section-label {
  display: flex; align-items: center; gap: 10px;
  font-size: .75rem; font-weight: 700; letter-spacing: .12em;
  text-transform: uppercase; color: var(--muted);
  padding: 0 20px; margin-bottom: 20px;
}
.section-label::before, .section-label::after {
  content:''; flex:1; height:1px; background:var(--border);
}

.bug-container {
    background: var(--surface);
    border: 2px solid var(--border);
    border-radius: 12px;
    padding: 24px;
    margin-bottom: 24px;
}
.scenario-desc {
    font-size: 1.1rem; color: var(--gold);
    margin-bottom: 16px; font-weight: 700;
}

.code-editor {
    background: #0d1117;
    border-radius: 8px;
    padding: 20px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 1.1rem;
    line-height: 1.6;
    color: #c9d1d9;
    border: 1px solid #30363d;
    overflow-x: hidden;
}
.code-line {
    display: flex;
    padding: 4px 8px;
    border-radius: 4px;
    transition: background 0.2s;
    cursor: pointer;
}
.code-line:hover {
    background: rgba(56, 189, 248, 0.1);
}
.code-line.selected {
    background: rgba(248, 113, 113, 0.2);
    border: 1px solid var(--red);
}
.code-line.correct {
    background: rgba(74, 222, 128, 0.2);
    border: 1px solid var(--green);
}

.line-num {
    color: #484f58;
    min-width: 40px;
    user-select: none;
    text-align: right;
    margin-right: 16px;
}
.line-content {
    white-space: pre-wrap;
    word-break: break-all;
}
.bug { color: #ff7b72; text-decoration: underline wavy var(--red); }

.feedback-box {
    margin-top: 20px;
    padding: 16px;
    border-radius: 8px;
    display: none;
    font-weight: 700;
    text-align: center;
}
.feedback-box.error {
    display: block;
    background: rgba(248, 113, 113, 0.1);
    color: var(--red);
    border: 1px solid var(--red);
}
.feedback-box.success {
    display: block;
    background: rgba(74, 222, 128, 0.1);
    color: var(--green);
    border: 1px solid var(--green);
}
</style>
</head>
<body>

<div class="page-header">
  <div class="badge-row">
    <span class="badge badge-blue">軟體設計丙級 · VB.NET</span>
    <span class="badge badge-gold" id="topic-badge">檢定題庫</span>
  </div>
  <h1>錯誤程式除錯<br><em>修復無法執行的代碼</em></h1>
  <p class="subtitle">找出隱藏在程式碼中的語法錯誤或邏輯錯誤並修正它。</p>
</div>

<div class="game-section">
  <div class="game-header" style="justify-content: flex-start; margin-bottom: 12px;">
    <a href="#" class="back-btn" id="btn-back">← 返回</a>
    <div class="mode-pill lvl-hard" id="mode-pill">錯誤程式除錯</div>
  </div>

  <div class="section-label">除錯實戰區</div>

  <div class="bug-container">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
        <div class="scenario-desc" style="margin-bottom:0;">⚠️ 請點選「有錯誤的那一行」程式碼：</div>
        <div id="bug-progress" style="font-size:.85rem;font-weight:700;color:var(--muted);white-space:nowrap;"></div>
      </div>
      <div class="code-editor" id="code-editor">
          <!-- 程式碼會在這裡產生 -->
      </div>
      <div class="feedback-box" id="feedback"></div>
      <div id="hint-area" style="display:none;margin-top:12px;padding:12px 16px;border-radius:8px;background:rgba(251,191,36,.08);border:1px solid rgba(251,191,36,.3);color:var(--gold);font-size:.95rem;font-weight:700;text-align:center;"></div>
  </div>

  <div class="btn-row">
      <button class="btn btn-ghost" id="btn-hint-debug">💡 提示</button>
      <button class="btn btn-primary" id="btn-next" style="display:none;">下一題 ➔</button>
  </div>
</div>

<div id="win-overlay">
  <div class="win-card">
    <span class="win-emoji">💎</span>
    <h2>除錯完成！</h2>
    <p id="win-desc"></p>
    <div class="win-score" id="win-stats"></div>
    <div style="display:flex;justify-content:center;gap:10px;flex-wrap:wrap;">
      <button class="btn btn-primary" id="btn-win-again">再挑戰一次</button>
      <button class="btn btn-primary" id="btn-win-next" style="background:linear-gradient(90deg,#4ade80,#10b981);color:#fff;">⏭️ 下一關</button>
    </div>
  </div>
</div>

<script src="../js/users.js"></script>
<script type="module" src="../js/api.js?v=10"></script>
<script src="../js/quiz_data.js"></script>
<script>
const urlParams = new URLSearchParams(window.location.search);
const qID = urlParams.get('q') || 'Q1';
const tID = urlParams.get('t') || 'T01';

// 預設錯誤題庫 — 按 qID 再按 tID 索引
const BUGS = {
    "SETUP": {
        "T01": [
            { orig: "Q1()", bug: "Q1[]", desc: "VB.NET 呼叫副程式使用小括號 ()，不是中括號 []" },
            { orig: "Q3()", bug: "Q 3()", desc: "副程式名稱中間不能有空格，應為 Q3()" }
        ]
    },
    "Q1": {
        "T01": [
            { orig: "For i = 0 To s.Length \\ 2 - 1", bug: "For i = 0 To s.Length / 2 - 1", desc: "字串長度的一半應使用整數除法 '\\'，而非一般除法 '/'" },
            { orig: "If s(i) <> s(s.Length - i - 1) Then", bug: "If s(i) = s(s.Length - i - 1) Then", desc: "迴文判斷應尋找「不相等」的字元來中斷，使用 <>" }
        ],
        "T02": [
            { orig: "Dim i As Integer = 0", bug: "Dim i As String = 0", desc: "計數器應宣告為整數 Integer" },
            { orig: "Do While i <= s.Length \\ 2 - 1", bug: "Do While i > s.Length \\ 2 - 1", desc: "Do While 應在 i 小於等於一半長度時「繼續執行」" }
        ],
        "T03": [
            { orig: "Loop While i <= s.Length \\ 2 - 1", bug: "Loop Until i <= s.Length \\ 2 - 1", desc: "如果是 Until，條件為真時會停止，因此應為 Loop While 以繼續執行" },
            { orig: "Exit Do", bug: "Exit For", desc: "Do 迴圈中應使用 Exit Do 來跳出" }
        ]
    },
    "Q2": {
        "T01": [
            { orig: "For i = 1 To n", bug: "For i = 0 To n", desc: "直角三角形第一列印 1 個數字，i 應從 1 開始，0 會多印一列" },
            { orig: "For j = 1 To i", bug: "For j = 1 To n", desc: "內層迴圈的上限應隨外層 i 增加，不是固定為 n" }
        ],
        "T02": [
            { orig: "Do While j <= i", bug: "Do Until j <= i", desc: "應使用 Do While 讓條件成立時「繼續」，Until 會讓條件成立時停止" },
            { orig: "j += 1", bug: "j -= 1", desc: "計數器要往上加才能達到上限，減 1 會無窮迴圈" }
        ],
        "T03": [
            { orig: "Loop While j <= i", bug: "Loop Until j <= i", desc: "Loop While 是條件成立繼續，Loop Until 是條件成立停止" },
            { orig: "i += 1", bug: "i *= 1", desc: "i 乘以 1 永遠不變，會導致無窮迴圈，應用 += 1" }
        ]
    },
    "Q3": {
        "T01": [
            { orig: "For i = 2 To n - 1", bug: "For i = 1 To n - 1", desc: "質數判斷從 2 開始除，任何數除以 1 餘數都是 0" },
            { orig: "If n Mod i = 0 Then", bug: "If n \\ i = 0 Then", desc: "判斷整除應用 Mod（取餘數），不是 \\（整數除法）" }
        ],
        "T02": [
            { orig: "Dim i As Integer = 2", bug: "Dim i As Integer = 0", desc: "除數不能從 0 開始，會造成除以零錯誤" },
            { orig: "Exit Do", bug: "Exit While", desc: "Do 迴圈中跳出應用 Exit Do，不是 Exit While" }
        ],
        "T03": [
            { orig: "ans = \"not\"", bug: "ans = \"yes\"", desc: "能被整除代表不是質數，標記應為 \"not\"" },
            { orig: "Loop While i <= n - 1", bug: "Loop Until i <= n - 1", desc: "Loop While 是條件成立繼續，Until 是條件成立停止" }
        ]
    },
    "Q4": {
        "T01": [
            { orig: "Dim min As Integer = 99", bug: "Dim min As Integer = 0", desc: "找最小值初始值要設極大（如 99），設 0 會導致比較失敗" },
            { orig: "If bmi < min Then min = bmi", bug: "If bmi > min Then min = bmi", desc: "找最小值應在 bmi 較小時更新，> 會變成找最大值" }
        ],
        "T02": [
            { orig: "Dim min As Integer = 99", bug: "Dim min As Integer = 0", desc: "找最小值初始值應為極大值，0 會讓所有正常 BMI 都無法更新" },
            { orig: "i += 1", bug: "i -= 1", desc: "計數器要往上加才能結束迴圈，減 1 會無窮迴圈" }
        ],
        "T03": [
            { orig: "Dim min As Integer = 99", bug: "Dim min As Integer = 0", desc: "找最小值初始值應設極大，0 會讓比較邏輯失效" },
            { orig: "Loop While i <= 3", bug: "Loop While i < 3", desc: "i 從 1 開始，< 3 只執行 2 次，應用 <= 3 執行 3 次" }
        ]
    },
    "Q5": {
        "T01": [
            { orig: "Dim a(2, 2), b(2, 2), c(2, 2) As Integer", bug: "Dim a(2, 2), b(2, 2), c(2, 2) As String", desc: "矩陣要做數學運算，應宣告為 Integer 不是 String" },
            { orig: "c(i, j) = a(i, j) + b(i, j)", bug: "c(i, j) = a(i, j) * b(i, j)", desc: "題目是矩陣「相加」，運算子應為 + 不是 *" }
        ],
        "T02": [
            { orig: "c(i, j) = a(i, j) + b(i, j)", bug: "c(i, j) = a(j, i) + b(i, j)", desc: "矩陣相加是對應位置相加，a 的索引不應顛倒為 (j,i)" },
            { orig: "j += 1", bug: "j -= 1", desc: "計數器要往上加才能結束迴圈，減 1 會無窮迴圈" }
        ],
        "T03": [
            { orig: "c(i, j) = a(i, j) + b(i, j)", bug: "c(i, j) = a(i, j) - b(i, j)", desc: "矩陣「相加」應用 +，不是 -" },
            { orig: "Loop While j <= 2", bug: "Loop Until j <= 2", desc: "Loop While 是條件成立繼續，Until 是條件成立停止" }
        ]
    },
    "1060306": {
        "T01": [
            { orig: "Dim data As New List(Of String())", bug: "Dim data As New List(Of Integer)", desc: "讀入的資料包含字串（身分證號碼），應用 String() 不是 Integer" },
            { orig: "If sum Mod 10 = 0 Then", bug: "If sum Mod 10 = 1 Then", desc: "身分證驗證碼檢查：總和除以 10 餘數為 0 才是合法" }
        ]
    },
    "1060307": {
        "T01": [
            { orig: "Dim sum As Integer = 0", bug: "Dim sum As String = 0", desc: "累加用變數應宣告為 Integer，不是 String" },
            { orig: "RichTextBox1.Text &=", bug: "RichTextBox1.Text =", desc: "使用 &= 附加文字，= 會覆蓋之前的輸出" }
        ]
    },
    "1060308": {
        "T01": [
            { orig: "For i = 0 To n - 1", bug: "For i = 1 To n", desc: "陣列索引從 0 開始，應為 0 To n-1" },
            { orig: "If a(i) > a(i + 1) Then", bug: "If a(i) < a(i + 1) Then", desc: "泡沫排序要把大的往後移，應在 > 時交換" }
        ]
    }
};

let currentBugIndex = 0;
let baseSteps = [];

window.addEventListener('load', () => {
    baseSteps = generateSteps(qID, tID);
    document.getElementById('mode-pill').textContent = `${qID} 除錯 (${tID})`;
    loadBug();
});

document.getElementById('btn-back').addEventListener('click', (e) => {
    e.preventDefault();
    window.location.href = `../index.html?q=${qID}&t=${tID}`;
});

function loadBug() {
    document.getElementById('feedback').className = 'feedback-box';
    document.getElementById('btn-next').style.display = 'none';
    document.getElementById('hint-area').style.display = 'none';
    document.getElementById('btn-hint-debug').disabled = false;
    document.getElementById('btn-hint-debug').style.display = 'inline-flex';

    let bugList = (BUGS[qID] && BUGS[qID][tID]) || [];
    if (currentBugIndex >= bugList.length) {
        currentBugIndex = 0;
    }

    // 更新進度
    document.getElementById('bug-progress').textContent = `第 ${currentBugIndex + 1} / ${bugList.length} 題`;
    
    let targetBug = bugList[currentBugIndex];
    let editor = document.getElementById('code-editor');
    editor.innerHTML = '';
    
    let currentIndent = 0;
    
    baseSteps.forEach((step, idx) => {
        let raw = step.code.trim();
        if (raw.startsWith("End ") || raw.startsWith("Next") || raw.startsWith("Loop")) {
            currentIndent = Math.max(0, currentIndent - 4);
        }
        
        let displayCode = " ".repeat(currentIndent) + raw;
        let isBugLine = (raw === targetBug.orig);
        if (isBugLine) {
            displayCode = " ".repeat(currentIndent) + targetBug.bug;
        }
        
        if (raw.startsWith("Private Sub") || raw.startsWith("For ") || raw.startsWith("If ") || raw.startsWith("Do")) {
            currentIndent += 4;
        }

        let lEl = document.createElement('div');
        lEl.className = 'code-line';
        lEl.innerHTML = `<div class="line-num">${idx+1}</div><div class="line-content">${escHtml(displayCode)}</div>`;
        
        lEl.addEventListener('click', () => {
             // 重置其他選取
             document.querySelectorAll('.code-line').forEach(el => {
                 el.classList.remove('selected', 'correct');
             });
             if (isBugLine) {
                 lEl.classList.add('correct');
                 let fb = document.getElementById('feedback');
                 fb.className = 'feedback-box success';
                 fb.innerHTML = `✅ 抓到蟲了！<br><span style="font-weight:normal; margin-top:8px; display:inline-block">${targetBug.desc}</span>`;
                 document.getElementById('btn-next').style.display = 'inline-block';
                 document.getElementById('btn-hint-debug').style.display = 'none';
             } else {
                 lEl.classList.add('selected');
                 wrongClicks++;
                 let fb = document.getElementById('feedback');
                 fb.className = 'feedback-box error';
                 fb.innerHTML = `❌ 錯誤！這裡語法沒問題，再找找看！`;
             }
        });
        
        editor.appendChild(lEl);
    });
}

let wrongClicks = 0; // 記錄錯誤點擊次數
let startTime = Date.now();
let totalHintsUsed = 0;

document.getElementById('btn-next').addEventListener('click', () => {
    currentBugIndex++;
    let bugList = (BUGS[qID] && BUGS[qID][tID]) || [];
    if (currentBugIndex >= bugList.length) {
        showWinOverlay();
        return;
    }
    loadBug();
});

document.getElementById('btn-hint-debug').addEventListener('click', () => {
    let bugList = (BUGS[qID] && BUGS[qID][tID]) || [];
    if (currentBugIndex >= bugList.length) return;
    let targetBug = bugList[currentBugIndex];
    // Find the bug line index
    let bugLineIdx = baseSteps.findIndex(s => s.code.trim() === targetBug.orig);
    let totalLines = baseSteps.length;
    let hintArea = document.getElementById('hint-area');
    if (bugLineIdx >= 0) {
        let msg = bugLineIdx < totalLines / 2 ? '🔍 錯誤在前半段程式碼' : '🔍 錯誤在後半段程式碼';
        hintArea.textContent = msg;
    } else {
        hintArea.textContent = '🔍 仔細比對每一行的語法！';
    }
    hintArea.style.display = 'block';
    totalHintsUsed++;
    document.getElementById('btn-hint-debug').disabled = true;
});

const LEVEL_SEQUENCE = [
  { q: 'SETUP', t: 'T01' }, { q: 'Q1', t: 'T01' }, { q: 'Q1', t: 'T02' }, { q: 'Q1', t: 'T03' },
  { q: 'Q2', t: 'T01' }, { q: 'Q2', t: 'T02' }, { q: 'Q2', t: 'T03' },
  { q: 'Q3', t: 'T01' }, { q: 'Q3', t: 'T02' }, { q: 'Q3', t: 'T03' },
  { q: 'Q4', t: 'T01' }, { q: 'Q4', t: 'T02' }, { q: 'Q4', t: 'T03' },
  { q: 'Q5', t: 'T01' }, { q: 'Q5', t: 'T02' }, { q: 'Q5', t: 'T03' },
  { q: '1060306', t: 'T01' }, { q: '1060307', t: 'T01' }, { q: '1060308', t: 'T01' }
];

function showWinOverlay() {
    const elapsed = Math.round((Date.now() - startTime) / 1000);

    // 星星：依提示次數計算（與其他頁面一致）
    let stars = 3;
    if (totalHintsUsed > 0 && totalHintsUsed <= 3) stars = 2;
    if (totalHintsUsed > 3) stars = 1;

    const title = QUIZ_DATA[qID] ? `${qID} ${QUIZ_DATA[qID].title} (${tID})` : qID;
    document.getElementById('win-desc').textContent = `成功修復 ${title} 的所有程式錯誤！`;
    document.getElementById('win-stats').innerHTML = `
        用時：${elapsed} 秒<br>
        錯誤點擊：${wrongClicks} 次<br>
        使用提示：${totalHintsUsed} 次
        <div style="margin-top:16px;display:flex;justify-content:center;gap:12px;">
            ${Array(3).fill(0).map((_, i) => `<span style="font-size:2.5rem;filter:${i < stars ? 'drop-shadow(0 0 12px rgba(251,191,36,0.8))' : 'grayscale(100%) opacity(20%)'};transform:scale(${i < stars ? 1.1 : 1});transition:all .3s;line-height:1;">⭐</span>`).join('')}
        </div>`;

    const overlay = document.getElementById('win-overlay');
    overlay.classList.add('show');

    // 下一關按鈕
    const curIdx = LEVEL_SEQUENCE.findIndex(l => l.q === qID && l.t === tID);
    const btnNext = document.getElementById('btn-win-next');
    if (curIdx >= 0 && curIdx < LEVEL_SEQUENCE.length - 1) {
        const next = LEVEL_SEQUENCE[curIdx + 1];
        btnNext.textContent = '⏭️ 下一關';
        btnNext.onclick = () => { window.location.href = `錯誤程式除錯.html?q=${next.q}&t=${next.t}`; };
    } else {
        btnNext.textContent = '🏆 返回闖關地圖';
        btnNext.onclick = () => { window.location.href = 'map.html?mode=錯誤程式除錯&tab=map'; };
    }

    // 儲存成績
    if (typeof getCurrentUser === 'function') {
        const user = getCurrentUser();
        if (user && typeof window.saveScore === 'function') {
            window.saveScore(user.className, user.name, qID + '_' + tID, "錯誤程式除錯", elapsed, "PASS", stars)
              .then(res => console.log("成績上傳完成:", res));
        }
    }
}

document.getElementById('btn-win-again').addEventListener('click', () => {
    document.getElementById('win-overlay').classList.remove('show');
    currentBugIndex = 0;
    wrongClicks = 0;
    totalHintsUsed = 0;
    startTime = Date.now();
    loadBug();
});

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
</script>
<script src="../js/game-toolbar.js"></script>
</body>
</html>
